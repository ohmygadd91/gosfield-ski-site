# Netlify configuration — Gosfield Water Ski Club (static site, no build step)
[build]
  publish = "."

# Sensible security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets aggressively (they rarely change)
[[headers]]
  for = "/brand_assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
